server:
  port: 8080

spring:
  application:
    name: novel-to-script

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ── Redis（短期记忆 / 断点续传缓存，24h TTL）──────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:123456}
      database: 4
      timeout: 2s
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # ── MySQL（历史记录持久化）──────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/qianniu_screenplay?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456789su}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update     # 自动建表/加列；生产环境改 validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # ── Jackson：LocalDateTime 序列化为 ISO-8601 字符串而非数组 ─────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false

qwen:
  api:
    key: ${DASHSCOPE_API_KEY}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model:
    name: qwen-plus

logging:
  level:
    com.qianniu: DEBUG
    org.springframework.web.client: INFO
