server:
  port: 8080

spring:
  application:
    name: novel-to-script
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

qwen:
  api:
    key: ${DASHSCOPE_API_KEY}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model:
    name: qwen-plus

logging:
  level:
    com.qianniu: DEBUG
    org.springframework.web.client: INFO
